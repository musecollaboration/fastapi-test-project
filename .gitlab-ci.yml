stages:
  - test
  - build
  - deploy

variables:
  DEV_IMAGE_TAG: $CI_REGISTRY_IMAGE:dev

test:
  stage: test
  image: python:3.14
  before_script:
    - pip install poetry
    - poetry config virtualenvs.create false
  script:
    - poetry install --with dev
    - poetry run ruff check .
    - poetry run pytest
  only:
    - dev

build-dev:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DEV_IMAGE_TAG .
    - docker push $DEV_IMAGE_TAG
  only:
    - dev

deploy-dev:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker-compose
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
  script:
    - ssh root@$VPS_HOST "
      cd /srv/dev &&
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
      docker compose pull &&
      docker compose down &&
      docker compose up -d
      "
  only:
    - dev
